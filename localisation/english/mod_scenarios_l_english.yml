l_english:

  # Scenario: The Aftermath
  # 1-1-1947
  mod_GUI_select_scenario: "Three powers, one prevails."
  aftermath: "The Aftermath"
  aftermath_desc: "It has been 2 years since the fall of Fascist Germany, but Europe never stays dormant. The USA has introduced interventionist policies after their new president was sworn in. The Italians and their allies have been waiting for this moment to show that Europe still has a fighting chance and that their time of mourning won't be used as a chance for outsiders to gain influence in Europe. The Soviet Union decides its time to spread communism and does that with the eastern european states as well as Communist China, which is fighting a civil war. There are three major powers, who will you pick?"
  aftermath_usa: "The United States of America, the face of democracy and the western world. After its new leader, Harry S Truman was sworn in, it introduced interventionist policies; One in which is to help war-torn European democratic countries to rebuild and be ready for whatever is to attack next."
  aftermath_uk: "After the war, the British Empire has been in decline. Losing many of its colonies and its influence worldwide, the UK now focuses on keeping its Commonwealth together and its economy stable. With the rise of independence movements in India and other colonies, the UK needs to find a way to keep its empire intact. However, with its weakened state and economic struggles, it may not be able to hold on for long."
  aftermath_italy: "Italy, after its conquest in the mid-late-1930s has gone silent for a while. But now, with a reignited spirit and the perfect chance to spread the \"solution\" worldwide and prove their dominance. Italy now aims to be a nation that can create new members of their ideology and lead them all to one main goal: Supremazia Fascista"
  aftermath_russia: "The Soviet Union, currently rebuilding as the effects of war, and Stalin has pressured on development efforts to bring the nation back where it was before the war. Although now in the era of diplomacy, Stalin wants his ideology to be widespread across the world. But with certain backlash by democratic states by breaking the Big Three and making their own faction."
  aftermath_germany: "Germany has been united for 30 years and has been the economic bank of the entirety of the EU. It has become the lifeline of many European countries post-Cold War. Although, with it's military being weak after Merkel abolished conscription and with looming threats in eastern europe, it can remilitarize again. The 4th Economic Reich is here, will it stand in the threats or fall?"
  aftermath_france: "The French Republic, a major member of the EU, responsible for it's diplomacy and external affairs. With protests against Macron and a revolution waiting for the spark, stability of the country is declining; It's labor laws and economic reforms have caused major inequality between the people and the country itself. Can it change or do we see another Napoleon rise again?"
  aftermath_china: "After winning the civil war and enforcing communism, China has developed much in the recent years after Mao. And still yet has one more goal, Take over the Republic Of China. With their claim on the Paracel Islands and recent scandals, China could become a base for another war."
  aftermath_brazil: "Brazil is the third largest country in the Americas, the second in PIB and Population. Called along its fellow latinos, \"America's backyard\". Brazil is pivotal in the search of these countries for their own path. With alliances such as Mercosul and UNASUL, Brazil has taken a leading role in South American affairs on the world stage."
  aftermath_indonesia: "Indonesia, a rising power in south east Asia. Known for its abundance of natural resources and its workforce mindset that boosts the economy for some time. United under one country and one ideology, Pancasila; it wants for a country with religious beliefs, socially equal in any way, and unity under diversity. However, with it's many reports of corruption and economic inequality in the country, it can fall."
  aftermath_other: "Other countries are developing in this peacetime, perhaps they can be the key countries for power in the world."

