l_english:

  # Scenario: The Aftermath
  # 1-1-1947

  # MAJORS
  mod_GUI_select_scenario: "Three powers, one prevails."
  aftermath: "The Aftermath"
  aftermath_desc: "It has been 2 years since the fall of fascism in Germany; And in the aftermath, the world is healing, and people are mourning. But not for long, A country who wasn't affected deeply by the Second World War challenges the balance of the world: The Italian Social Republic. Which after deposing their king and making a series of interventionist policies, aims to return Italy to its glory.\n\nThe United States; After their president died in office, they elected his successor which created the Truman Doctrine. In which The United States will provide political, military and economic assistance to all democratic nations under threat from external or internal authoritarian forces.\n\nAnd The Union of Socialist Soviet Republics, wants to spread communism worldwide by utilising weak countries to topple their governments and join the new International. But neither side wants to coexist.\n\nThrough diplomacy or conflicts, one can only achieve true supremacy. Who will it be? Mussolini and his International Fascist League? Truman and NATO? or Stalin and The New Communist International? You decide, as the world is on the brink of another major war."
  aftermath_usa: "The United States of America, the hero of WW2 and the bastion of democracy. After their president died suddenly, Harry S. Truman was sworn in and has planning to impose interventionist policies across the world named: \"The Truman Doctrine\". Which guarentees that the US will help in political, economical and social affairs in democratic countries against foreign authoritarian threats. Although the Second World War was a victory to celebrate, there are still many dangers out there that threaten the stability of the world. Truman waits for your call."
  aftermath_uk: "After the war, the British Empire has been in decline. Losing many of its colonies and its influence worldwide, the UK now focuses on keeping its Commonwealth together and its economy stable. With the rise of independence movements in India and other colonies, the UK needs to find a way to keep its empire intact. However, with its weakened state and economic struggles, it may not be able to hold on for long."
  aftermath_italy: "The Italian Social Republic, celebrates its 25th anniversary of fascist control in the country. Italy has long gone dormant after their short conquest of multiple nations in the mid-1930s; And now after a serious war plagues Europe, it aims to finished their imposed plans on countries and achieve Italia Irredenta. While also being the only fascist major country in the world, and facing extreme criticism from fascist government type. It tries to lower tensions down by establishing diplomatic relations with many countries and prepare them for the conversion to fascism. Mussolini waits for your orders."
  aftermath_russia: "The Union of Socialist Soviet Republics, with a \"Victory Day\" to celebrate. The USSR was hit hard during the war, losing key economical and industrial cities such as: Kyiv, Minsk and Stalingrad. With these downsides, the people have asked for the nation to properly handle these losses and get back on its knees. With the liberation of Eastern Europe, Stalin wants Eastern Europe to be his \"satellites\" and secure dominance in Europe. But as communism grows, their opponents try to stop it from happening. Stalin wants dominance and you are his advisor."
  aftermath_germany: "With the cold loss of the Second World War, Germany has been forcefully changed to a democratic state. Removing its past and rebuilding for the future, as both countries are at a loss. Germany is now just another pawn, which previously been the king. Will Germany unite again as one? Or it will stay seperated, forever?"
  aftermath_france: "The French Republic, a major member of the EU, responsible for it's diplomacy and external affairs. With protests against Macron and a revolution waiting for the spark, stability of the country is declining; It's labor laws and economic reforms have caused major inequality between the people and the country itself. Can it change or do we see another Napoleon rise again?"
  aftermath_china: "After winning the civil war and enforcing communism, China has developed much in the recent years after Mao. And still yet has one more goal, Take over the Republic Of China. With their claim on the Paracel Islands and recent scandals, China could become a base for another war."

  # MINORS
  aftermath_indonesia: "Indonesia, a rising power in south east Asia. Known for its abundance of natural resources and its workforce mindset that boosts the economy for some time. United under one country and one ideology, Pancasila; it wants for a country with religious beliefs, socially equal in any way, and unity under diversity. However, with it's many reports of corruption and economic inequality in the country, it can fall."
  aftermath_croatia: "The Independent State of Croatia, a country led through violence and persecution. With it killing many Serbians in what's called the worst genocide of Serbians internationally, has called for attention. Even though they are small, but their motivation to the country is impeccable: \"Za dom spremni!\". As Croatia is trying to proclaim its independence, will they succeed or keep being a minor country amongst others? Ante Pavelić waits on what's next."

  # OTHERS
  aftermath_other: "Other countries are developing in this peacetime, perhaps they can be the key countries for power in the world."

  # GUI
