  # Ideas
  mod_GER_industrial_1: "New German Industrialization"
  mod_GER_industrial_1_desc: "After thourough research in industry and technology, German factories were able to further boost production of products while keeping costs low. This has led to a economic boost of the country and it plans to further improve in the coming years through the 4 year plan."
  mod_GER_abolished_conscription: "Conscription Abolished"
  mod_GER_abolished_conscription_desc: "In 2011, A proposal by the government and the Ministry of Defense caused by some factors was made to abolish conscription. The Bundeswehr now aims to recruit more troops on the field for national guard and to protect it's allies from Russia."
  mod_GER_split_country: "A Split Country"
  mod_GER_split_country_desc: "Even after the fall of the Berlin Wall, Germany is still divided in politics, employment rates, general economy between the East and the West. This has led Germany to be considered \"split\" again."

  # National Focus 

  # Political
  mod_GER_focus: "$GER_ADJ$ National Focus"
  mod_GER_politics_democrat: "Towards a Better Federal Republic"
  mod_GER_politics_democrat_desc: "Democracy is the key for a free and better country. Germany shall not be split over political parties and differences in infrastructure, but united under one banner and one party. Let Germany be the face of democracy to europe and beyond!"
  mod_GER_politics_oppose: "The Alternative for Germany"
  mod_GER_politics_oppose_desc: "Democracy is a fallacy that should be disregarded and a bad memory. Bring back the old days where we are not oppresed by the laws of democracy, but expand infinitely without any nation bothering us. We need an alternative for Germany."
  mod_GER_politics_empire: "Return to Monarchism"
  mod_GER_politics_empire_desc: "$mod_nat_focus_generic$"

  # Industry
  mod_GER_industry: "Expand, Efficiency, Export."
  mod_GER_industry_desc: "$mod_nat_focus_generic$"
  mod_GER_industry_factories: "Increase Military Spending"
  mod_GER_industry_factories_desc: "$mod_nat_focus_generic$"
  mod_GER_industry_mining: "Improve Mining in Upper Harz"
  mod_GER_industry_mining_desc: "To improve our army and production of equipment, we need more resources. We can improve the efficiency of the Upper Harz mining industry to reduce imports and build around the area. Doing this will open opportunities for more mining technological improvements and aluminium production."

  # Army
  mod_GER_army_start: "Re-enable Conscription"
  mod_GER_army_start_desc: "In 2011, conscription was put on a temporary suspension after a proposal by the Ministry of Defence at that time. But now, with a ambitious future and wanting to prepare for another european war, we must bring back conscription to prepare for the worst."

  # World Tension
  mod_GER_oppose: "Democracy opposed"
  mod_GER_return_empire: "Monarchist coup d'état"

