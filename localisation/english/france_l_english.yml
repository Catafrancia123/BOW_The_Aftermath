  # Ideas
  mod_FRA_protests: "Protests against Emmanuel Macron"
  mod_FRA_protests_desc: "Since the start of his presidency, Emmanuel Macron has paved a way to French neoliberalism and globalisation, as well as revision of labor laws and high fuel taxes. Major unrest has been seen all across the country, leading to decrease in production of items and economic downturn."
  mod_FRA_economic_appeal: "Labor Law Reforms"
  mod_FRA_economic_appeal_desc: "Parliament has allowed us to change the current French labor laws under a time period of 2 months, decisions can be taken to revise old laws and pass laws that help the well-being of French citizens. This can be crucial for the economic and country stabilty of France."
  mod_FRA_revise_el_khomri: "Revision of the El Khomri law"
  mod_FRA_revise_el_khomri_desc: "An effect of the labor law reforms."

  # National Focus 

  # Political
  mod_FRA_focus: "French National Focus"
  mod_FRA_politics_democrat: "Economic Equality"
  mod_FRA_politics_democrat_desc: "Economic reforms over Macron's administration have caused unrest due to inequality for the civilians. An appeal to parliament can change the reforms with the help of the French people. This strengthens Macron as a president and stabilises the country, however it can decrease the amount of money from taxes."
  mod_FRA_politics_oppose: "Another Revolution"
  mod_FRA_politics_oppose_desc: "Germany must live under a different way and must embrace the path it shall take. The culture and lifestyle in the new democratic Germany has made the nation in sorrow and despair. We must bring back the old Germany, the one that can rule us equally and improve the economy."
  mod_FRA_politics_empire: "Overthrow Macron"
  mod_FRA_politics_empire_desc: "In current years, democracy has weakened us all. From the lifestyle of germans to the economic business, it's all bad. But now we can oppose and elect a new Kaiser to rule Germany back to its old days. Either a peaceful change of power or a civil war, we will succeed!"

  # Industry
  mod_FRA_industry: "German Industrial Revolution"
  mod_FRA_industry_desc: "The industry of Germany has been great, but it can be improved. Together, under the 4 year plan to improve in research, industrialization, technology, etc. Germany will improve in economics and decrease unemployment, open jobs and increase export altogether."
  mod_FRA_industry_factories: "Factories in Rhineland"
  mod_FRA_industry_factories_desc: "The Rhineland has been long forgotten. Ever since the reunification, Germany has focused in East Germany in development, infrastructure and more. To improve economics, we must remilitarize the factories in Rhineland."

