  mod_FRA_bop_democratic_full: "A True Federal Republic"

  # Events
  mod_FRA_events.1.t: "The German Civil War"
  mod_FRA_events.1.d: "Due to rising concerns of the government and the rise of anti-democratic riots and a worsening economy in Germany, The nation has chosen to start a civil war with the current government as to overthrow it and appoint a new leader for Germany. The new era for Germany starts here, and the world has mixed reactions.\n\nWorld tensions have increased and many countries have volunteered their army to either side, with the west helping the democrats and the east helping the monarchists. Similar monarchists movements in many countries have increased and pressuring democracy to the edge."
  mod_FRA_events.1.op1: "Politics need to be handled properly..."

  # Technology
  mod_FRA_tech_infantry_gun_1: "Gewehr 36"
  mod_FRA_tech_infantry_gun_1_desc: "The Gewehr 36 is the current service rifle of Germany, created in 1990 and adapted by the Bundeswehr in 1997."
