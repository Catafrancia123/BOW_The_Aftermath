l_english:
  # International Fascist League
  faction_IFL: "International Fascist League"

  faction_goal_IFL_worldwide_fascism_name: "Spread Fascism Worldwide"
  faction_goal_IFL_worldwide_fascism_desc: "Fascism has fallen in these years, many countries have rejected its influence or ban it entirely. Our many allies worldwide can unite together to rebuild what is lost and spread our ideology to every corner of the globe, even if it means using force."

  faction_goal_IFL_mediterranean_fascism_name: "Control the Mediterranean"
  faction_goal_IFL_mediterranean_fascism_name: "The Mediterranean Sea is the hub for our currently small faction, controlling it means controlling trade, military movement, and influence over three continents. By establishing naval and air superiority in this region, we can ensure our dominance and protect our interests from rival powers."

  IFL_target_countries_mediterranean_name: "IFL Target Countries - Mediterranean"

  IFL_decisions: "International Fascist League Decisions"
  IFL_decisions_desc: "Fascism is declining, and this faction will be the sanctuary of fascist countries worldwide and a journey to rebuild fascist dominance once again."
  IFL_ITA_new_demand_dalmatia: "Demand Dalmatia"
  IFL_ITA_new_demand_dalmatia_desc: "As the focus of the Duce about all state in the Adriatic Sea must be under Italian control, demanding Dalmatia will guarantee that. Dalmatia is a key state to expand according to the vision of Greater Italy."
  IFL_ITA_demand_corfu: "Demand Corfu"
  IFL_ITA_demand_corfu_desc: "Corfu is an island in the Ionian Sea, it has been under Italian control since the early 20th century, but it is currently under Greek control. Demanding Corfu will be a step towards reclaiming our lost territories and asserting our dominance in the region."

  IFL_ITA_release_croatia: "Release Croatia"
  IFL_ITA_release_croatia_desc: "The Croatian people have long since requested their independence from us, we should give them their independence while keeping an eye for any more genocides that they'll do."

  # The Warsaw Pact
  faction_TWP: "The Warsaw Pact"
  