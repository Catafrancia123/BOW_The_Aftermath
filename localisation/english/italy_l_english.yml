l_english:
  # Basics (overwrite)
  ITA: "Italy"
  ITA_DEF: "Italy"
  ITA_ADJ: "Italian"
  ITA_short_name: "Italy"

  # Special Names
  ITA_fascism: "Italian Social Republic"
  ITA_fascism_DEF: "the Italian Social Republic"
  EGY_italy: "Republic of Egypt"
  YUG_movement: "Yugoslavian People's Republic"
  SYR_unity: "United Arab Republic"
  SPR_fascism: "Spanish State"
  SPR_fascism_DEF: "the Spanish State"

  BUL_ITA_fascism_subject: "Liberated Bulgaria"
  BUL_ITA_fascism_subject_DEF: "Liberated Bulgaria"
  HUN_ITA_fascism_subject: "Liberated Hungary"
  HUN_ITA_fascism_subject_DEF: "Liberated Hungary"
  CZE_operation_castle_front: "Liberated Czech Republic"
  CZE_operation_castle_front_DEF: "Liberated Czech Republic"

  # Country Political Parties
  mod_ITA_democratic_party: "DC"
  mod_ITA_democratic_party_long: "Democrazia Cristiana" 
  mod_ITA_fascist_party: "PNF"
  mod_ITA_fascist_party_long: "Partito Nazionale Fascista"
  mod_ITA_fascist_military_party: "MNI"
  mod_ITA_fascist_military_party_long: "Militare Nazionale Italia"
  mod_ITA_communism_party: "PCI"
  mod_ITA_communism_party_long: "Partito Comunista Italiano"
  mod_ITA_neutrality_party: "Non-Aligned"
  mod_ITA_neutrality_party_long: "Non-Aligned"

  # Leader Descriptions (add later)
  ITA_lion_tamer: "$lion_tamer$"
  ITA_lion_tamer_2: "$lion_tamer$"
  ITA_mussolini_desc: "Benito Mussolini Amilcare Andrea, the father and creator of the newest ideology to hit the stage: Fascism. Born from a poor family and had a pretty rough childhood, he believes that someday the nation that he was born in could be better. And so it was his focus to spread fascism from ex-military personnel to the people of Italy. And in 1922, he managed to do that after his historic \"March on Rome\", and after that he started to try to win his way inside parliment and try to dissolve it as well as gaining recognition by nations worldwide and his people especially. He introduced the main principal beliefs points of his Italian Fascism such as: Vittoria Mutilata and Italiana Irredentismo, Spazio Vitale. He believes that his nation will be an empire that rules over other nation that doesn't need to conquer a single kilometer of territory at all.\n\nAnd now, he thinks that the perfect time to spread fascism is now, during the time of mourning and loss. His Grand Council of Fascism has helped in many parts of international negotiations such as: The creation of the International Fascist League in 1944, The signage of the Bordeaux Colonial Agreement and many more. His efforts to build his dreamed Italy are nearly done, and now it just requires the spirit that he ignited in his followers before."

  # Ideas
  # Scenario Ideas
  mod_ITA_strenghtened_nationalism: "Strengthened Nationalism"
  mod_ITA_strenghtened_nationalism_desc: "The rise of Fascism in Italy has brought a new sense of nationalism and pride to the Italian people. The government has implemented policies to promote national unity and pride, which has led to increased support for the regime and its goals."
  mod_ITA_motivated_soldiers: "Motivated Soldiers"
  mod_ITA_motivated_soldiers_desc: "The Italian soldiers under Mussolini's ideals have been motivated enough to fight for its future. Men who are willing to die and reclaim what was trusted to Italy."
  mod_ITA_miltary_industrialization: "Italian Military Industrialization Program"
  mod_ITA_miltary_industrialization_desc: "The Duce has ordered a massive military and infrastructure industrialization program to ensure that Italy is powerful in economics and industry. This program will focus on increasing the production of military equipment and modernizing our armed forces; Aswell as increasing the infrastructure of our cities and transportation systems."

  mod_ITA_colonial_motivation: "Colonial Work Movement"
  mod_ITA_colonial_motivation_desc: "Under our new modernization plan, the colonies will work hard for the future of Italy. We must ensure that our colonies are well taken care of and treat them equally. This will ensure that our colonies will be loyal to us and will work hard for the greatness of Italy."
  mod_ITA_fascist_influence: "Italian Fascist Influence"
  mod_ITA_fascist_influence_desc: "Fascism from Italian origins have been appealing to our people. Their leader is trying to spread fascism again across the world and make them their allies."

  # Military Dynamic Modifiers
  mod_ITA_army: "Esercito Nazionale Italia"
  mod_ITA_army_desc: "The Italian National Army, compiled from people who were members of the Blackshirts and new recruits with the spirit of Italian Irredentism. Although strong at size, because Italy had enforced too much resources in modernizing the Army, it has faced a equipment crisis. Now it requires a smooth stability between army size and equipment amount by creating more weapons that are reliable in battle, efficient in resources, and under a single caliber. The rest has been fixed from the policies imposed by Mussolini in the early 1940s, with better organization and tactics to keep up with the modern world."
  ITA_eni_intro_tt: "Modify §Y$mod_ITA_army$§! by:"
  ITA_eni_entrenchment_tt: "   - Unit entrenchment: $VALUE$"
  ITA_eni_org_regain_tt: "   - Organization Regain: $VALUE$"
  ITA_eni_org_factor_tt: "   - Organization: $VALUE$"
  ITA_eni_planning_speed_tt: "   - Planning speed: $VALUE$"
  ITA_eni_initiative_tt: "   - Initiative: $VALUE$"
  ITA_eni_attack_tt: "   - Attack: $VALUE$"
  ITA_eni_attack_speed_tt: "   - Attack speed: $VALUE$"
  ITA_eni_breakthrough_tt: "   - Breakthrough: $VALUE$"
  ITA_eni_org_moving_tt: "   - Organization loss while moving: $VALUE$"


  mod_ITA_navy: "Marina Nazionale Italia"
  mod_ITA_navy_desc: "The Italian National Navy, the strongest in The Mediterannean. The Navy has focused on making reliable destroyers and light ships that they forgot that their heavy ships were outdated. And a navy with a strong fleet must have the balance between the both. The Navy must also invest in building better heavy ships as well as train sailors to invent new tactics that are special to The Mediterranean to ensure sucess in defending the homeland. Mussolini's reforms had made a surplus of destroyers, and could be re-assigned to adjust the new era of wars at sea."
  mod_ITA_airforce: "Aeronautica Nazionale Italia"
  mod_ITA_airforce_desc: "The Italian National Air Force, Italo Balbo's dream. The Airforce under Balbo's command has had many reforms, one of which is the production of planes. His aviators have been very busy training with old 1930 - early 1940s airplanes that airplane innovation was stuck on adding more guns or making planes more efficient instead of making new innovations in planes. And with Italy entering a new era of combat, their planes could be outdated fighting newer ones and even when size is no difference, technology still wins. Balbo's reforms have made aviators be adaptable in any weather, reduced chances of airplane accidents, and made planes more fuel-efficient."

  # Laws
  italian_corporatism: "Italian Corporatist System"
  italian_corporatism_desc: "The Italian Corporatist Economic System focuses on linking employees with employers as one union to represent the state's economic producers and work alongside the state to fulfull its goals. With this, the entire industrial force of Italy is under control of the state."
  mod_ITA_italian_corporatism_idea: "Italian Corporatist System"
  mod_ITA_italian_corporatism_idea_desc: "The Italian Corporatist Economic System focuses on linking employees with employers as one union to represent the state's economic producers and work alongside the state to fulfull its goals. With this, the entire industrial force of Italy is under control of the state."

  # National Focus
  mod_ITA_focus: "$ITA_ADJ$ National Focus" 
  mod_ITA_interventionist_leaders: "Only available for the following leaders:\n      - Benito Mussolini\n      - Italo Balbo\n      - Galeazzo Ciano"
  mod_ITA_diplomatic_leaders: "Only available for the following leaders:\n      - Benito Mussolini\n      - Dino Grandi"

  # Political
  focus_ITA_politics_start: "Another Revolution for Fascism"
  focus_ITA_politics_start_desc: "After the fall of Germany and the Axis powers, Fascism is at a all time low and certain nations are being targeted by the victors, especially Italy. We must rise again and spread fascism across the Mediterranean and the Balkans, as well as modernizing our colonies to be equal to us."
  focus_ITA_politics_irredentism: "Irredentismo Italiano"
  focus_ITA_politics_irredentism_desc: "After the end of WW1, Italy was promised many territories in the Balkans and the Mediterranean, but they were not given to us. We will demand these territories back diplomatically or by force. The world will know that Italy is a powerful nation that cannot be ignored."
  focus_ITA_politics_supremacy: "Supremazia Fascista"
  focus_ITA_politics_supremacy_desc: "After the bombing of Hiroshima and Nagasaki, the world knew that their fate in order to achive their dreams could be extinguised by a nuclear weapon. Italy can't fight for glory with force, but instead with diplomacy and influence. We will spread our influence across the world and make them our allies, and we will show them that fascism is the only way to live."

  focus_ITA_politics_puppets: "To Live as a Greater Lion"
  focus_ITA_politics_puppets_desc: "The Italian people have faced victory in the Balkans as well as in Africa, not only as a consumer of the victory, but as a producer for it. With a world filled with communists and democrats, we will stand tall as one strategic league. Remember that its better to live a single day as a lion than a century as a sheep."

  # Mediterranean sub-branch
  focus_ITA_mediterranean: "Mare Nostrum"
  focus_ITA_mediterranean_desc: "The vision of the Duce is to have control of the entirety of the Mediterranean sea, and with the recent diplomatic conquests in Africa and the Balkans, we are one step closer to achieving that goal. With our powerful navy and airforce, we will dominate the seas and skies of the Mediterranean."

  focus_ITA_mediterranean_egypt_influence: "Influence Egypt"
  focus_ITA_mediterranean_egypt_influence_desc: "Egypt is a key strategic location in the Mediterranean, and with our new and growing fascist influence there, we can control the Suez Canal and the trade routes that pass through it. Fascism will spread and be the living way of the people in Egypt, and soon enough, they will be our allies in the Mediterranean."
  focus_ITA_mediterranean_egypt_take_suez: "Take Control of the Suez Canal"
  focus_ITA_mediterranean_egypt_take_suez_desc: "We have succeeded in the Egyptian intervention and expansion, now we must take over the Suez Canal in order to make Italy have full control in trade and military in the Mediterranean. The world will know that fascism will prevail in Europe and Africa."

  focus_ITA_mediterranean_greece_oppress_communists: "Oppress Communism"
  focus_ITA_mediterranean_greece_oppress_communists_desc: "There have been rumors of a suspected uprising in the Balkan area, especially Greece. And we must take every step of precaution to elimintate this threat before it comes to knock on our borders."
  focus_ITA_mediterranean_greece_oppress_communists_tt: "Spread anti-communism propaganda:"
  focus_ITA_mediterranean_greece_befriend: "Diplomatic Talks with Greece"
  focus_ITA_mediterranean_greece_befriend_desc: "After succesfully defeating communism in Serbia and Greece, we can make Greece as our ally to prevent further intervention from the Eastern bloc."
  focus_ITA_mediterranean_greece_attack: "Get Our Claimed Terriories"
  focus_ITA_mediterranean_greece_attack_desc: "We have some terriotries in Greece that we claim, we must take it by force!"

  focus_ITA_mediterranean_mideast_lebanon: "Expand Influence in Lebanon"
  focus_ITA_mediterranean_mideast_lebanon_desc: "Lebanon is a newly independent country after the pro-independence movements forced a treaty to abolish the mandate. Now, the country is in political and economical turmoil as many parties from the outside world are trying to take their place in Syria. We can use this opportunity to expand our influence in the Middle East and unite the Lebanese and the Syrians."
  focus_ITA_mediterranean_mideast_syria: "Expand Influence in Syria"
  focus_ITA_mediterranean_mideast_syria_desc: "The First Syrian Republic is a newly independent country after the mandate was dissolved, and they need help standing for themselves. We can use this opportunity to expand our influence in the Middle East."
  focus_ITA_mediterranean_mideast_palestine: "Intervene in the Arab-Israeli War"
  focus_ITA_mediterranean_mideast_palestine_desc: "The Arab-Israeli War is ongoing after the British Mandate was dissolved, we need to intervene to make peace talks and even spread fascism throughout the holy land."

  # Balkan sub-branch
  focus_ITA_politics_european_focus: "The Balkan Campaign"
  focus_ITA_politics_european_focus_desc: "After the fall of the communist movements in the Balkans, we must ensure that our influence is strong and that we can control the region. The Balkans are a key strategic location in Europe, and with our influence there, we can control the trade routes and military movements in the region."
  focus_ITA_europe_operation_castle_front: "Operation Castle Front"
  focus_ITA_europe_operation_castle_front_desc: "Operation Castle Front is an special military operation done by [ITA.GetName] to \"liberate\" the Eastern European countries from communism. The operation is divided into 4 stages, and each stage has its own objectives and requirements."

  # Internal Affairs sub-branch
  focus_ITA_politics_leader: "The Future of Italy"
  focus_ITA_politics_leader_desc: "The Duce has been the leader of Italy for a long time; but as he gets older, we need to think about the future of Italy and who will lead us next. We have many potential leaders that can take over the leadership of Italy, and we must choose wisely to ensure that Italy continues to thrive under fascism."
  focus_ITA_politics_leader_tt: "Elections will be held in 1-2 months:"

  focus_ITA_leader_mussolini: "Continue with Benito Mussolini"
  focus_ITA_leader_mussolini_desc: "Benito Mussolini has been the leader of Italy for a long time, and he has brought Italy to greatness. And so, we need to consecrate his leadership and make him leader for life."
  focus_ITA_leader_mussolini_consecrate: "Consecrate Mussolini's Leadership"
  focus_ITA_leader_mussolini_consecrate_desc: "Benito Mussolini has been re-elected as Duce of Italy, which means the people's aspiration is still in Mussolini's favor. And to guarentee that, we must prepare a decree to declare him leader till his death. And to repurpose our exiled king, Vittorio Emannuele III or his son, Umberto II to lead the colonies."

  focus_ITA_leader_successor: "The Next Duce"
  focus_ITA_leader_successor_desc: "Benito Mussolini is getting older, and we need to think about the future of Italy and who will lead us next. The fascist party has many potential leaders that are suitable to be the successor of Mussolini."
  focus_ITA_leader_dino_grandi: "Dino Grandi"
  focus_ITA_leader_dino_grandi_desc: "Dino Grandi was the Italian foreign minister and the current foreign minister for the United Kingdom. He has diplomatic skills and is well respected to make good terms amongst countries. His way of fascism is to spread it with diplomacy and influence, he will support fascist revolutionary groups in other countries and make them our probable allies."
  focus_ITA_leader_italo_balbo: "Italo Balbo"
  focus_ITA_leader_italo_balbo_desc: "Italo Balbo is the current leader of the Italian Air Force and is well known for his military skills and his charisma. He although wants to continue Mussolini's ideas and using the military and by creating new technologies to continue Italian Irredentism."
  focus_ITA_leader_galeazzo_ciano: "Galeazzo Ciano"
  focus_ITA_leader_galeazzo_ciano_desc: "Galeazzo Ciano is the current Italian foreign minister and is a believer of 'spazio vitale' and wants Italy to be a strong player in world politics. He wants Italy to be more active in global conflicts."

  focus_ITA_leader_council: "The Grand Council of Fascism"
  focus_ITA_leader_council_desc: "The Grand Council of Fascism is the main constitutional body of Italy. It is made up of the most important members of the fascist party and the government, and they are responsible for making important decisions for the country. With this, Italy becomes more of a collective leadership."
  focus_ITA_leader_council_collective: "Collective Fascist Leadership"
  focus_ITA_leader_council_collective_desc: "A new way of fascism has risen, The Grand Council of Fascism was selected as the leader of Mussolini. The people wanted a more collective and more radical approach to how Italy is led, and they instead wanted the whole collective of Mussolini's organization to lead collectively."

  focus_ITA_military_government: "Form a Military Government"
  focus_ITA_military_government_desc: "Italo Balbo has expressed his concern in the success of achieving Italian Irredentism, and he vows to see his empire before his death. So, in order to meet up to his demands, we could establish a military state. Giving all power to the military and Balbo himself."
  focus_ITA_military_government_dismantle_tt: "Dismantles The Grand Council of Fascism:"
  focus_ITA_military_government_switch_tt: "Gives full control to the military:"


  # Industry
  focus_ITA_industry: "The Italian Corporatist Economic System"
  focus_ITA_industry_desc: "The Italian Corporatist Economic System focuses on linking employees with employers as one union to represent the state's economic producers and work alongside the state to fulfull its goals. With this, the entire industrial force of Italy is under control of the state."
  focus_ITA_industry_tt: "Unlocks the Italian Corporatist Economic System:"
  focus_ITA_industry_colonial: "Colonial Production Support"
  focus_ITA_industry_colonial_desc: "After years of exploration around our colonies, we have found sufficient space for our new round of factories and investments. This could improve production by a great amount as well as improving compliance to the state."
  focus_ITA_industry_mainland: "The Italian Corporatist Economic System"
  focus_ITA_industry_mainland_desc: "The Italian Corporatist Economic System focuses on linking employees with employers as one union to represent the state's economic producers and work alongside the state to fulfull its goals. With this, the entire industrial force of Italy is under control of the state."

  # Army
  focus_ITA_army: "$mod_ITA_army$"
  focus_ITA_army_desc: "$mod_ITA_army_desc$"

  focus_ITA_army_grand_battleplan: "The Old Ways"
  focus_ITA_army_grand_battleplan_desc: "Our ancestors believed that planning for conflicts are important, and could lead us to victory. We have won countless battles with this strategy in mind, and have proven to be efficient and saved us from dozens of casualties. And as our agenda is to restore the Italy it was before, we must continue this tradition in order to succeed."

  focus_ITA_army_mobile_warfare: "The Way of Lightning"
  focus_ITA_army_mobile_warfare_desc: "Germany previously has shown us the power of \"Blitzkrieg\" or attacking like a lightning bolt would, and has shown success across many terrains and multiple nations. And as our industry is slowly adjusting to the modern era, we would like a change in Italian military to prioritize speed and efficiency across all our battles."

  focus_ITA_army_superior_firepower: "Domination by Destruction"
  focus_ITA_army_superior_firepower_desc: "Our domination in the battlefield shouldn't be dependant on gunfire and trenches, but instead by bombs and support. By increasing our bombing on the enemy, we could achieve less casualties with a downside of using many resources. And we can prove that an empire is a nation that has influence over its neighbors without taking a single piece of land."

  # Decisions
  # Misiolinis
  ITA_missiolinis_events.1_ocf.t: "Take over [$COUNTRY$.GetName]"
  ITA_missiolinis_events.1_ocf.d: "We have declared war on [$COUNTRY$.GetName] to help the fascist revolutionaries in their fight for freedom, and as our agenda of completing the operation fast, we must do it quickly before the war escalates and can trigger a major war. The future of Eastern Europe is in our hands, and we must not fail our mission."
  ITA_missiolinis_events.1_ocf.op1: "Adapt, Obey, Fight!"

  ITA_missiolinis_events.2_ocf.t: "Invasion of [$COUNTRY$.GetName] fails"
  ITA_missiolinis_events.2_ocf.d: "Our invasion of [$COUNTRY$.GetName] has failed, and now the war has escalated. We will have to focus on de-escalating quickly to prevent a major war, and we must not fail next time."
  ITA_missiolinis_events.2_ocf.op1: "We will do better next time."

  ITA_missiolinis_events.3_ocf.t: "Invasion of [$COUNTRY$.GetName] succeeds"
  ITA_missiolinis_events.3_ocf.d: "Our invasion of [$COUNTRY$.GetName] has succeeded, and we have liberated the country from communism. We will have to focus on consolidating our gains and preventing a major war, and we must continue to liberate."
  ITA_missiolinis_events.3_ocf.op1: "One off the books."

  ITA_missiolinis_events.1_militia_ocf.t: "Militia Action in [?ITA_militia_action_state.GetName]"
  ITA_missiolinis_events.1_militia_ocf.d: "Our support for militia action in [?ITA_militia_action_state.GetName] has succeeded, the control of the state was done peacefully. This marks [?ITA_militia_action_state.GetName] being controled by the revolutionaries, which is a step closer to liberating the country from communism."
  ITA_missiolinis_events.1_militia_ocf.op1: "Another one saved."
  ITA_missiolinis_events.2_militia_ocf.t: "$ITA_missiolinis_events.1_militia_ocf.t$"
  ITA_missiolinis_events.2_militia_ocf.d: "Our support for militia action in [?ITA_militia_action_state.GetName] has succeeded; Although a few police divisions came along the way, it was still a success. This marks [?ITA_militia_action_state.GetName] being controled by the revolutionaries, which is a step closer to liberating the country from communism."
  ITA_missiolinis_events.2_militia_ocf.op1: "$ITA_missiolinis_events.1_militia_ocf.op1$"
  ITA_missiolinis_events.3_militia_ocf.t: "$ITA_missiolinis_events.1_militia_ocf.t$"
  ITA_missiolinis_events.3_militia_ocf.d: "Our support for militia action in [?ITA_militia_action_state.GetName] has succeeded; Turns out the military was present and resulted in a bloddy conflict, but with our trained militia forces, we managed to defeat the military with heavy losses. This marks [?ITA_militia_action_state.GetName] being controled by the revolutionaries, which is a step closer to liberating the country from communism."
  ITA_missiolinis_events.3_militia_ocf.op1: "Some losses are required for victory."
  ITA_missiolinis_events.4_militia_ocf.t: "$ITA_missiolinis_events.1_militia_ocf.t$"
  ITA_missiolinis_events.4_militia_ocf.d: "Our support for militia action in [?ITA_militia_action_state.GetName] has succeeded; Turns out the military was present and resulted in a bloddy conflict, but they had more superior military, which led to heavy losses and the retreat from the state. This marks the loss of [?ITA_militia_action_state.GetName] from liberation."
  ITA_missiolinis_events.4_militia_ocf.op1: "We will come back stronger."

  ITA_missiolini_conquer_egypt:0 "Conquer Egypt"
  ITA_missiolini_conquer_egypt_desc:0 "We have successfully did a fascist coup in Egypt. Now, lets move to win and control the Suez Canal!"
  ITA_missiolinis_events.1_industry.tt:0 "$TRIGGER_NUM_OF_CIVILIAN_FACTORIES_MORE_THAN$§Y[?ITA_missiolinis_military_factories]§!. (Currently §[GetColorNumOfCivsMissiolinis][?ROOT.num_of_civilian_factories]§!.)"
  
  ITA_missiolinis.1_egypt.tt: "Help the [IEG.GetName] to capture these states:\n- Cairo\n- Luxor\nWhile also defending these states:\n- Suez"
  ITA_missiolinis_events.1_egypt.t: "Successful Intervention in Egyptian Politics"
  ITA_missiolinis_events.1_egypt.d: "Our intervention efforts in expanding fascism in Egypt has succeeded and has triggered a civil war. To make Egypt our key ally in controlling the Suez Canal, we must send support with equipment and volunteers. Our expansion will be victorious!"
  ITA_missiolinis_events.1_egypt.op1: "For the Duce!"

  ITA_missiolinis_events.2_egypt.t: "Success in Egypt"
  ITA_missiolinis_events.2_egypt.d: "Our backed-up fascist government in Egypt has taken over Cairo and has won the civil war. Egypt is now a fascist country, and we are one step closer to achiveing the entirety of the Mediterranean sea."
  ITA_missiolinis_events.2_egypt.op1: "Glory to Italy!"
  ITA_missiolinis_events.2_egypt.tt: "Establish the fascist government in Egypt as our ally:"

  ITA_missiolinis_events.3_egypt.t: "Struggle in Egypt"
  ITA_missiolinis_events.3_egypt.d: "Our backed-up fascist government in Egypt hasn't been able to fufill our demands and take over Cairo yet, and the civil war is still ongoing. The only way to ensure victory is to declare war on Egypt; We must not fail our mission to control the Mediterranean sea."
  ITA_missiolinis_events.3_egypt.op1: "Desperate times call for desperate measures."
  ITA_missiolinis_events.3_egypt.tt: "Declare war on Egypt to help the fascist revolution:"

  # Non-Misiolinis
  ITA_consecrate_the_leadership: "Consecrate the Leadership"
  ITA_consecrate_the_leadership_desc: "We have won 2 proxy wars in Egypt and Greece. And since our influence in the Mediterranean is growing stronger, we need to change how our leadership works. Benito Mussolini will be the eternal leader of Italy; And the exiled king, Vittorio Emanuele III, will be ruling Ethiopia and Egypt. This will ensure that mainland Italy stays controlled by the Duce, while also giving leverage to the king."

  # Policies
  ITA_hold_elections: "Hold $ITA_election_decisions$"
  ITA_hold_elections: "Benito Mussolini despite winning $ITA_election_decisions$, has confessed that being a leader of a whole country at the time is tiring. He can't enjoy life's treasures and have a normal life. And so, the elections must be held again and see if the people are willing to choose his sucessor."

  # Elections (1947-1950 any year within the timeline)
  ITA_election_decisions: "The [GetYear] Italian Successor Elections"
  ITA_election_decisions_desc: "Benito Mussolini is getting old, and because of that, he has announced multi-candidate elections for the first time after [?ITA_years_since_last_election|Y|.0] years. The future of Italy is decided in this election; and with it, Mussolini's successor. The candidates are: §YBenito Mussolini, Dino Grandi, Italo Balbo, Gian Galeazzo Ciano§!."

  ITA_election_countdown: "Time till $ITA_election_decisions$"
  IIA_elections_allowed_tt: "Elections are allowed"
  ITA_elections_done_tt: "$ITA_election_decisions$ has been done."
  ITA_election_countdown_1: "$ITA_election_countdown$ is less than 30 days."
  ITA_election_countdown_2: "$ITA_election_countdown$ is less than 60 days."

  ITA_election_select_council: "Select $ITA_grand_council$"
  ITA_election_select_mussolini_desc: "Select $ITA_grand_council$ as the collective leader of Italy."
  ITA_election_selected_mussolini_tt: "Mussolini wins $ITA_election_decisions$"

  ITA_elections_decision_title: "$ITA_election_decisions$ Estimated Results"
  ITA_elections_decision_desc: "§Y[ITA_best_candidate]§! is winning ([ITA_best_canidate_percentage])"

  mod_ITA_reforms_election: "Country-wide Reforms"
  mod_ITA_reforms_election_desc: "[ITA.country_leader.GetName] has imposed reforms in political, economical, and military subjects across the nation. These reforms take some time to adjust to, and there will be reductions of productivity till the reforms are satisfied."

  # Operation Castle Front
  ITA_operation_castle_front: "$focus_ITA_europe_operation_castle_front$ - [ITA_ocf_stage]"
  ITA_operation_castle_front_desc: "Operation Castle Front is an special military operation done by [ITA.GetName] to \"liberate\" the Eastern European countries from communism. The operation is divided into 4 stages, and each stage has its own objectives and requirements. For [ITA_ocf_stage], the target(s) are: §Y[ITA_ocf_targets]§!."

  # OCF scripted loc
  ITA_ocf_stage_1: "Stage 1"
  ITA_ocf_targets_1: "[BUL.GetNameWithFlag], [HUN.GetNameWithFlag], and [ROM.GetNameWithFlag]"
  ITA_ocf_stage_2: "Stage 2"
  ITA_ocf_targets_2: "[CZE.GetNameWithFlag] and [GDR.GetNameWithFlag]"
  ITA_ocf_stage_3: "Stage 3"
