  # Generic Events
  ITA_generic_events.1.t: "[FROM.GetName] Accepts"
  ITA_generic_events.1.d: "[FROM.GetName] has accepted the demand and has given us full ownership of: [ITA_requested_states_loc]. Another step closer towards a Greater Italy!"
  ITA_generic_events.1.op1: "Another Victory."

  ITA_generic_events.2.t: "[FROM.GetName] Declines"
  ITA_generic_events.2.d: "[FROM.GetName] has rejected the demand and has given us a warning to not take: [ITA_requested_states_loc]. Because those are core territories of [FROM.GetName]. We either have to take it by force or discuss it again for something in return."
  ITA_generic_events.2.op1: "We shall return stronger."

  ITA_generic_events.3.t: "[?ITA_elections_selected.GetName] Elected"
  ITA_generic_events.3.d: "[?ITA_elections_selected.GetName] has won $ITA_election_decisions$ and will start a new term in October. This is the selected leader that is trusted to uphold Italian Fascism and lead Italy to be better than ever."
  ITA_generic_events.3.op1: "Heil the Duce!"

  ITA_generic_events.4.t: "Italy Demands [ITA_requested_states_loc_title]"
  ITA_generic_events.4.d: "Italy has sent an ultimatum for these states in our territory: [ITA_requested_states_loc]. and we are pressured to accept their demands to prevent an all-out war. The choice is not in our favor, but it'll prevent us from future trouble."
  ITA_generic_events.4.op1: "We have no choice."
  ITA_generic_events.4.op2: "Never! they are all pure [ROOT.GetAdjectiveCap] territory!"
  ITA_generic_events.4.tt_1: "Grants full control of: [ITA_requested_states_loc] to Italy."
  ITA_generic_events.4.tt_2: "Declines Italy's proposal, which could lead to bad relations and even war."

