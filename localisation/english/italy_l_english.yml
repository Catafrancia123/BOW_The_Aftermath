  # Country Events
  ITA_events.1.t: "Leader of the Corporatist System"
  ITA_events.1.d: "The new corporatist system that was implemented requires a leader to arrange all trades and contracts between companies. There are 4 suitable choices."
  ITA_events.1.op1: "Terni Industria"
  ITA_events.1.op2: "Fiat"
  ITA_events.1.op3: "Brescia"
  ITA_events.1.op4: "Astaldi"

  ITA_events.2.t: "Benito Mussolini Dead"
  ITA_events.2.d: "Benito Mussolini has been reported dead in his house, the cause of death is natural causes. The country has declared Gian Galeazzo Ciano as his sucessor and has put a 30 day mourning period for him. His death marks the end of The first Duce era, may he rest in peace."
  ITA_events.2.op1: "Its time to move on."

  ITA_events.3.t: "Croatia Appeals Economic System"
  ITA_events.3.d: "Croatia has asked us to appeal our current economic system in the country, calling it \"not authentic\" to the territory. As Croatia is actively trying to gain independence, we have to review our current methods in autonomy."
  ITA_events.3.op1.tt: "Allows Croatia to have an independent economic system."
  ITA_events.3.op1: "The economy should be decided by themselves."
  ITA_events.3.op2: "Our methods are better."

  ITA_events.4.t: "Croatia Pushes for Independence"
  ITA_events.4.d: "Ante Pavelić, the leader of Croatia, has sent $ITA_short_name$ a letter regarding their state's autonomy. They demand that $ITA_short_name$ can end their puppet rule in Croatia as $ITA_short_name$ have promised them before. In order for Croatia to still be our ally, $ITA_short_name$ will guarentee their independence as long as they are in the International Fascist League.\n\nThe Treaty of Belgrade mentions the ability of a Croatian independence happening at any time Croatia requires, and guaranteeing its full existence if Croatia still is a member of the IFL after its independence."
  ITA_events.4.op1: "We'll give them what they deserve."
  ITA_events.4.op1.tt: "[ITA.GetNameWithFlag] starts preparing for Croatian independence:"



  # News Events (REMEMBER TO INCLUDE [THIS.GetNewsHeader] AT THE START OF THE DESCRIPTION.)
  ITA_news_header: "\n             £ITA_news_header\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"
  ITA_news_events.1.t: "Italy continues on for Italian Irredentism"
  ITA_news_events.1.d: "[THIS.GetNewsHeader]Fascist leader Benito Mussolini said today during a speech: §R\"We will continue our planned ways to expand Italy and take what was taken from us!\"§!. This has led to speculation of Italy continuing the political movement of Italian Irredentism, which is to annex territories around Italy that they claim to be \"truly italian\". Many countries that are targets of these have tried to respond by issuing diplomatic affairs before to even out the tensions, but the Italian spirit lives on."
  ITA_news_events.1.op1: "It returns..."

  ITA_news_events.2.t: "Italy Issues Diplomatic Efforts"
  ITA_news_events.2.d: "[THIS.GetNewsHeader]After a brutal war and witnessing the atomic bombing of Hiroshima and Nagasaki, fascist leader Benito Mussolini said: §R\"I'd like to stay peaceful now, as were not like those Americans.\"§!. This points to the new movement: Supremazia Fascista, which is a new way to spread fascism; Not by force, but by diplomatic actions and influence. Italy already has potential targets in and out of Europe. And they just need to proceed and hope the best out of it."
  ITA_news_events.2.op1: "Italy is going on a more peaceful route..."

  ITA_news_events.3.t: "Italy Releases Croatia"
  ITA_news_events.3.d: "[THIS.GetNewsHeader]Italy has released Croatia as a free country after [?CRO_puppet_years]. Poglavnik Ante Pavelić and fascist leader Benito Mussolini were seen today at the independence ceremony. Ante Pavelić expressed his concerns and assured the country would live on independently, but still be inside the International Fascist League sphere. This also has led to international concern, as the persecution of Serbians were halted back in 1943; and now, who knows if it will continue again?"
  ITA_news_events.3.op1: "Another country free from control..."

  ITA_news_events.4.t: "Italy Announces Elections"
  ITA_news_events.4.d: "[THIS.GetNewsHeader]Italy has announced elections for the first time since 1924. But, these elections aren't ordinary, because its purpose is for the people to choose who will be the next leader. Some candidates are: §RBenito Mussolini, Dino Grandi, Italo Balbo, Gian Galeazzo Ciano§!. Elections will be held in around 1-2 months."
  ITA_news_events.4.op1: "A one-party election is not an election."

  ITA_news_events.5.t: "The Italian-Spanish Trade Agreement"
  ITA_news_events.5.d: "[THIS.GetNewsHeader]Italy and Spain have announced a joint agreement from both sides on the access of the Mediterranean Sea. After the recent civil war on Egypt, Italy has taken over the Suez Canal and imposed economic reforms to the region. And in doing so, the two sides agree on the limitation of military access going in and out of the Mediterranean Sea. While trade ships are still allowed under correct credentials.\nBoth sides have imposed checkpoints near these important straits as they account for over 80% of global trade. Many countries have applied for a special visa that allows both trade and military access inside the Mediterranean Sea. Experts believe that the Bosphorus Strait will be the next and final strait that either side wants to take control over."
  ITA_news_events.5.op1: "Absolute Bollocks!"
  ITA_news_events.5.op2: "We underestimated them..."
  ITA_news_events.5.op3: "You gotta be kidding me!"
  ITA_news_events.5.op4: "Long live [ROOT.GetName]!"

  ITA_news_events.6.t: "Benito Mussolini Dead"
  ITA_news_events.6.d: "[THIS.GetNewsHeader]Benito Mussolini has been reported dead in his house, the cause of death is natural causes. The country declares a 30 day mourning period for Mussolini. His title of Duce is automatically given to his son in-law, Gian Galeazzo Ciano; Which marks the end of the first Duce era.  He was the founder of fascism, a father, a leader and a hero in Italian history. May he rest in peace."
  ITA_news_events.6.op1: "Rest in peace, father of fascism."
  ITA_news_events.6.op2: "A loss for Italy."

  # Election News Event
  ITA_news_events.elections.1.t: "Benito Mussolini Re-elected"
  ITA_news_events.elections.1.d: "[THIS.GetNewsHeader]$ITA_election_decisions$ has ended, and the results show that Benito Mussolini was selected to continue his term as Duce. Other candidates congratulated Mussolini for his win at the elections and the comparison between him and his sucessors weren't really that small. He promises that he will focus on Italy's main problems: §RInternational relations, Military size, and Development of the nation.§! As he is old, he will be assisted by his adjudant and many members of The Grand Council of Fascism."
  ITA_news_events.elections.1.op1: "People still do love him..."

